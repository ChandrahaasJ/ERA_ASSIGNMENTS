<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenizer Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ececec;
      color: #1a1a1a;
      padding: 16px;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border: none;
      outline: none;
      resize: vertical;
      font-family: "Roboto Mono", "Menlo", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.5;
      color: #1a1a1a;
      background: transparent;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .token-count {
      font-family: "Roboto Mono", "Menlo", "Consolas", monospace;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .token-output {
      font-family: "Roboto Mono", "Menlo", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .token-output .tok {
      border-radius: 3px;
      padding: 1px 0;
    }

    .token-ids {
      font-family: "Roboto Mono", "Menlo", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-all;
      color: #333;
    }

    .status {
      font-size: 13px;
      color: #888;
      text-align: center;
      padding: 8px;
    }

    .status.error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <textarea id="input" spellcheck="false" placeholder="Enter text to tokenize…"></textarea>
    </div>

    <div class="card">
      <div class="label">Token count</div>
      <div class="token-count" id="count">0</div>
    </div>

    <div class="card">
      <div class="token-output" id="output"></div>
    </div>

    <div class="card">
      <div class="token-ids" id="token-ids"></div>
    </div>

    <div class="status" id="status">Loading tokenizer.json…</div>
  </div>

  <script>
    const COLORS = [
      "#cce5ff",
      "#fff3cd",
      "#d4edda",
      "#f8d7da",
      "#e2d5f1",
      "#d1ecf1",
    ];

    // GPT-2 pre-tokenizer (matches tokenizer_v2.py GPT2_PATTERN).
    const GPT2_PATTERN =
      /'s|'t|'re|'ve|'m|'ll|'d| ?\p{L}+| ?\p{N}+| ?[^\s\p{L}\p{N}]+|\s+(?!\S)|\s+/gu;

    let tokenizer = null;

    function pairKey(left, right) {
      return left + "\0" + right;
    }

    function buildRanks(merges) {
      const ranks = new Map();
      merges.forEach(([left, right], index) => {
        ranks.set(pairKey(left, right), index);
      });
      return ranks;
    }

    function pretokenize(text) {
      const normalized = text.normalize("NFC");
      const sequences = [];
      GPT2_PATTERN.lastIndex = 0;
      let match;
      while ((match = GPT2_PATTERN.exec(normalized)) !== null) {
        const chunk = match[0];
        if (chunk) {
          sequences.push([...chunk]);
        }
      }
      return sequences;
    }

    function mergePair(tokens, pair) {
      const [left, right] = pair;
      const merged = left + right;
      const result = [];
      let i = 0;
      while (i < tokens.length) {
        if (i < tokens.length - 1 && tokens[i] === left && tokens[i + 1] === right) {
          result.push(merged);
          i += 2;
        } else {
          result.push(tokens[i]);
          i += 1;
        }
      }
      return result;
    }

    function applyBpeMerges(tokens, ranks) {
      if (tokens.length < 2 || ranks.size === 0) {
        return tokens;
      }

      while (true) {
        let bestPair = null;
        let bestRank = Infinity;
        for (let i = 0; i < tokens.length - 1; i += 1) {
          const rank = ranks.get(pairKey(tokens[i], tokens[i + 1]));
          if (rank !== undefined && rank < bestRank) {
            bestRank = rank;
            bestPair = [tokens[i], tokens[i + 1]];
          }
        }
        if (bestPair === null) {
          break;
        }
        tokens = mergePair(tokens, bestPair);
        if (tokens.length < 2) {
          break;
        }
      }
      return tokens;
    }

    function encode(text, data) {
      if (!text) return [];

      const tokens = [];
      for (const sequence of pretokenize(text)) {
        tokens.push(...applyBpeMerges(sequence, data.ranks));
      }
      return tokens;
    }

    function tokenId(token, data) {
      if (data.token_to_id && Object.prototype.hasOwnProperty.call(data.token_to_id, token)) {
        return data.token_to_id[token];
      }
      return data.token_to_id?.["<unk>"] ?? -1;
    }

    function render() {
      if (!tokenizer) return;

      const text = document.getElementById("input").value;
      const tokens = encode(text, tokenizer);
      const countEl = document.getElementById("count");
      const outputEl = document.getElementById("output");
      const idsEl = document.getElementById("token-ids");

      countEl.textContent = String(tokens.length);

      outputEl.innerHTML = tokens
        .map((tok, i) => {
          const color = COLORS[i % COLORS.length];
          const escaped = tok
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
          return `<span class="tok" style="background-color:${color}">${escaped}</span>`;
        })
        .join("");

      idsEl.textContent = tokens.map((tok) => tokenId(tok, tokenizer)).join(", ");
    }

    async function init() {
      const statusEl = document.getElementById("status");
      try {
        const response = await fetch("tokenizer.json");
        if (!response.ok) {
          throw new Error(`Failed to load tokenizer.json (${response.status})`);
        }
        tokenizer = await response.json();
        tokenizer.ranks = buildRanks(tokenizer.merges || []);
        statusEl.textContent = "";
        statusEl.style.display = "none";

        const input = document.getElementById("input");
        input.value = "<|im_start|>system<|im_sep|>You are a helpful assistant\n<|im_start|>user<|im_sep|>\n\n<|im_start|>assistant<|im_sep|>\n";
        input.addEventListener("input", render);
        render();
      } catch (err) {
        statusEl.textContent = err.message;
        statusEl.classList.add("error");
      }
    }

    init();
  </script>
</body>
</html>
